<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="auditor logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- the file under audit -->
  <rect x="50" y="44" width="116" height="150" rx="16" fill="#FFFFFF"/>
  <g stroke="#C7D2FE" stroke-width="9" stroke-linecap="round">
    <line x1="72" y1="78" x2="144" y2="78"/>
    <line x1="72" y1="104" x2="126" y2="104"/>
    <line x1="72" y1="130" x2="136" y2="130"/>
    <line x1="72" y1="156" x2="114" y2="156"/>
  </g>

  <!-- magnifying glass auditing it -->
  <circle cx="170" cy="162" r="46" fill="#1E293B" fill-opacity="0.10"/>
  <circle cx="170" cy="162" r="46" fill="none" stroke="#1E293B" stroke-width="12"/>
  <line x1="203" y1="195" x2="228" y2="220" stroke="#1E293B" stroke-width="16" stroke-linecap="round"/>

  <!-- the finding: a clean check -->
  <path d="M151 162 l13 13 l25 -28" fill="none" stroke="#22C55E" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
