# Run the auditor against a repo mounted at /auditor.
#   docker compose run --rm auditor scan .
#   docker compose run --rm auditor scan . --format sarif
#   TARGET=/path/to/repo docker compose run --rm auditor scan .
services:
  auditor:
    build: .
    image: auditor:latest
    volumes:
      - ${TARGET:-./}:/auditor
      - auditor-index:/root/.auditor   # persist the incremental cache across runs
    working_dir: /auditor

  # Long-running MCP server over stdio (for agent integration). Point an MCP client at:
  #   docker compose run --rm -T auditor-mcp
  auditor-mcp:
    build: .
    image: auditor:latest
    volumes:
      - ${TARGET:-./}:/auditor
      - auditor-index:/root/.auditor
    working_dir: /auditor
    entrypoint: ["auditor-mcp"]
    stdin_open: true
    tty: true

volumes:
  auditor-index:
