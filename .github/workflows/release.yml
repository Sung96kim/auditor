name: release

# Auto-release on merge to main. Commitizen picks the next version from the conventional commits
# since the last tag, commits the bump to main + tags it, then this same run builds, publishes to
# PyPI (Trusted Publishing / OIDC — no token), and creates the GitHub Release. If the commits
# since the last tag aren't release-worthy (only docs/ci/chore/…), it no-ops.
#
# No manual step: just merge conventional-commit work to main. (Preview locally with
# `uv run cz bump --dry-run`.)

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Don't let the workflow's own bump commit re-trigger it.
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: bump version') }}"
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write # push the bump commit + tag, create the GitHub Release
      id-token: write # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for commitizen
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --all-extras

      # Gate: never release red code.
      - run: uv run ruff check auditor tests
      - run: uv run ruff format --check auditor tests
      - run: uv run pytest -q

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version (commitizen)
        id: bump
        run: |
          set +e
          uv run cz bump --yes 2>&1 | tee bump.log
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -eq 0 ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 21 ] || grep -q "NO_COMMITS_TO_BUMP" bump.log; then
            echo "No release-worthy commits since the last tag — nothing to release."
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            exit "$code"
          fi

      - name: Push bump commit + tag
        if: steps.bump.outputs.released == 'true'
        run: git push origin main --follow-tags

      - name: Build distributions
        if: steps.bump.outputs.released == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.bump.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create the GitHub Release
        if: steps.bump.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.bump.outputs.tag }}"
          # Backtick-wrap @tokens (decorators like @abstractmethod, handles) so GitHub can't
          # auto-link them as user mentions / phantom "contributors" in the notes.
          uvx --from commitizen cz changelog "${tag#v}" --dry-run \
            | sed -E 's/(^|[[:space:](])@([A-Za-z0-9_-]+)/\1`@\2`/g' > release-notes.md
          gh release create "${tag}" --title "${tag}" --notes-file release-notes.md dist/*
